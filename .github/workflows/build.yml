name: Build and Release

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build ShortBlock
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Read version from semver.txt ──────────────────────────────────────
      - name: Read version from semver.txt
        id: version
        run: |
          SEMVER=$(cat semver.txt | tr -d '[:space:]')
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"

          BRANCH="${GITHUB_REF_NAME}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          if [ "$BRANCH" = "main" ]; then
            TAG="v${SEMVER}"
            CHANNEL="stable"
            PRERELEASE="false"
          else
            # Count beta builds for this version on develop
            BETA_COUNT=$(git tag --list "v${SEMVER}-beta.*" | wc -l | tr -d ' ')
            BETA_NUM=$((BETA_COUNT + 1))
            TAG="v${SEMVER}-beta.${BETA_NUM}"
            CHANNEL="beta"
            PRERELEASE="true"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "### Version Info" >> "$GITHUB_STEP_SUMMARY"
          echo "- semver: \`$SEMVER\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- tag: \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- channel: \`$CHANNEL\`" >> "$GITHUB_STEP_SUMMARY"

      # ── Check if tag already exists (skip duplicate stable releases) ──────
      - name: Check for existing tag
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Tag ${{ steps.version.outputs.tag }} already exists — skipping release." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Stamp version into project files ──────────────────────────────────
      - name: Stamp version
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          SEMVER="${{ steps.version.outputs.semver }}"

          # project.pbxproj – MARKETING_VERSION
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${SEMVER}/" \
            ShortBlock.xcodeproj/project.pbxproj

          # manifest.json – "version"
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"${SEMVER}\"/" \
            "ShortBlock Extension/Resources/manifest.json"

          echo "✅ Stamped version ${SEMVER} into project.pbxproj and manifest.json"

      # ── Xcode setup ───────────────────────────────────────────────────────
      - name: Select Xcode
        if: steps.check_tag.outputs.exists == 'false'
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Resolve SPM dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ShortBlock.xcodeproj \
            -scheme ShortBlock

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (Release)
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          xcodebuild \
            -project ShortBlock.xcodeproj \
            -scheme ShortBlock \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build \
            | xcpretty || true

      # ── Archive ───────────────────────────────────────────────────────────
      - name: Archive
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          xcodebuild \
            -project ShortBlock.xcodeproj \
            -scheme ShortBlock \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "${{ runner.temp }}/ShortBlock.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive \
            | xcpretty || true

      # ── Package ───────────────────────────────────────────────────────────
      - name: Package app
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          ARCHIVE_PATH="${{ runner.temp }}/ShortBlock.xcarchive"
          APP_PATH=$(find "$ARCHIVE_PATH" -name "ShortBlock.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::ShortBlock.app not found in archive"
            find "$ARCHIVE_PATH" -type f | head -20
            exit 1
          fi
          cd "$(dirname "$APP_PATH")"
          zip -r "${{ runner.temp }}/ShortBlock.zip" "ShortBlock.app"
          echo "Created ShortBlock.zip ($(du -h "${{ runner.temp }}/ShortBlock.zip" | cut -f1))"

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload build artifact
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ShortBlock-${{ steps.version.outputs.tag }}
          path: ${{ runner.temp }}/ShortBlock.zip
          retention-days: 90

      # ── Update appcast.xml ────────────────────────────────────────────────
      - name: Update appcast.xml
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          SEMVER="${{ steps.version.outputs.semver }}"
          CHANNEL="${{ steps.version.outputs.channel }}"
          ZIP_PATH="${{ runner.temp }}/ShortBlock.zip"
          ZIP_SIZE=$(stat -f%z "$ZIP_PATH")
          PUB_DATE=$(date -u '+%a, %d %b %Y %H:%M:%S %z')
          DOWNLOAD_URL="https://github.com/vordenken/ShortBlock/releases/download/${TAG}/ShortBlock.zip"

          # Build the new <item> block
          SPARKLE_CHANNEL=""
          if [ "$CHANNEL" = "beta" ]; then
            SPARKLE_CHANNEL="
                <sparkle:channel>beta</sparkle:channel>"
          fi

          NEW_ITEM="        <item>
                <title>Version ${TAG}</title>${SPARKLE_CHANNEL}
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure
                    url=\"${DOWNLOAD_URL}\"
                    sparkle:version=\"${SEMVER}\"
                    length=\"${ZIP_SIZE}\"
                    type=\"application/octet-stream\"/>
            </item>"

          # Insert the new item right after <title>ShortBlock Updates</title> line
          # (before the closing comment or any existing items)
          python3 - "$NEW_ITEM" <<'PYEOF'
          import sys, re

          new_item = sys.argv[1]

          with open("appcast.xml", "r") as f:
              content = f.read()

          # Insert after the <title>ShortBlock Updates</title> line (and any comment after it)
          # Find the position right before </channel>
          insert_pos = content.rfind("</channel>")
          if insert_pos == -1:
              print("::error::Could not find </channel> in appcast.xml")
              sys.exit(1)

          updated = content[:insert_pos] + new_item + "\n    " + content[insert_pos:]

          with open("appcast.xml", "w") as f:
              f.write(updated)

          print(f"✅ Inserted new appcast item for {sys.argv[1][:50]}...")
          PYEOF

          echo "Updated appcast.xml with $TAG entry"
          cat appcast.xml

      # ── Commit appcast.xml back to branch ─────────────────────────────────
      - name: Commit updated appcast.xml
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: update appcast.xml for ${{ steps.version.outputs.tag }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}

      # ── Create & push tag ─────────────────────────────────────────────────
      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          echo "🏷️ Tagged ${{ steps.version.outputs.tag }}"

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ShortBlock ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          files: ${{ runner.temp }}/ShortBlock.zip
          generate_release_notes: true
          body: |
            ## Installation

            > ⚠️ **Note:** This build is **unsigned**. To open it, right-click → **Open** → **Open**.

            1. Download `ShortBlock.zip` below
            2. Unzip and move `ShortBlock.app` to your Applications folder
            3. Open the app — it will guide you to enable the Safari extension
            4. Enable **ShortBlock** in Safari → Settings → Extensions

            ### What's blocked
            - Shorts in the sidebar navigation
            - Shorts shelves on the home feed
            - Individual Short items in feed, search, and recommendations
            - Automatic redirect away from `/shorts/` pages
