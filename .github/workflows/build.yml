name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build ShortBlock
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ShortBlock.xcodeproj \
            -scheme ShortBlock

      - name: Build (Release)
        run: |
          xcodebuild \
            -project ShortBlock.xcodeproj \
            -scheme ShortBlock \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build \
            | xcpretty || true

      - name: Archive (for release)
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
        run: |
          xcodebuild \
            -project ShortBlock.xcodeproj \
            -scheme ShortBlock \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "${{ runner.temp }}/ShortBlock.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive \
            | xcpretty || true

      - name: Package app
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
        run: |
          ARCHIVE_PATH="${{ runner.temp }}/ShortBlock.xcarchive"
          APP_PATH=$(find "$ARCHIVE_PATH" -name "ShortBlock.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: ShortBlock.app not found in archive"
            find "$ARCHIVE_PATH" -type f | head -20
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "${{ runner.temp }}/ShortBlock.zip" "ShortBlock.app"
          echo "Created ShortBlock.zip"
          ls -la "${{ runner.temp }}/ShortBlock.zip"

      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ShortBlock
          path: ${{ runner.temp }}/ShortBlock.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ShortBlock ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ runner.temp }}/ShortBlock.zip
          generate_release_notes: true
          body: |
            ## Installation

            > ⚠️ **Note:** This build is **unsigned**. macOS will warn you that the app is from an unidentified developer. To open it:
            > 1. Right-click (or Control-click) `ShortBlock.app`
            > 2. Select **Open**
            > 3. Click **Open** in the dialog

            ### Steps
            1. Download `ShortBlock.zip` below
            2. Unzip and move `ShortBlock.app` to your Applications folder
            3. Open the app — it will guide you to enable the Safari extension
            4. Enable **ShortBlock** in Safari → Settings → Extensions

            ### What's blocked
            - Shorts in the sidebar navigation
            - Shorts shelves on the home feed
            - Individual Short items in the feed, search results, and recommendations
            - Automatic redirect away from `/shorts/` pages
